<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED88 Store - Products & Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Background image overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/srorebackgrandpic.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        /* HEADER */
        header {
            background: linear-gradient(90deg, #e63946 0%, #a4161a 100%);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.3);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .user-info a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .user-info a:hover {
            background: rgba(255,255,255,0.3);
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        /* BREADCRUMB */
        .breadcrumb {
            color: #a0a0a0;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .breadcrumb a {
            color: #e63946;
            text-decoration: none;
            transition: all 0.3s;
        }

        .breadcrumb a:hover {
            color: #fff;
        }

        /* PAGE TITLE */
        .page-header {
            background: linear-gradient(135deg, rgba(230, 57, 70, 0.1) 0%, rgba(164, 22, 26, 0.1) 100%);
            border: 2px solid #e63946;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 36px;
            color: #e63946;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(230, 57, 70, 0.3);
        }

        .page-header p {
            color: #a0a0a0;
            font-size: 14px;
        }

        /* FILTER & SORT */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(230, 57, 70, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            backdrop-filter: blur(10px);
        }

        .controls select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(230, 57, 70, 0.3);
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .controls select:focus {
            outline: none;
            border-color: #e63946;
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.2);
        }

        .controls label {
            color: #a0a0a0;
            font-size: 13px;
        }

        /* PRODUCT GRID */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        /* PRODUCT CARD */
        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(230, 57, 70, 0.3);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: #e63946;
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.25);
            transform: translateY(-8px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            color: #a0a0a0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .product-name {
            color: #e63946;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .product-description {
            color: #a0a0a0;
            font-size: 13px;
            margin-bottom: 12px;
            flex-grow: 1;
            line-height: 1.5;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(230, 57, 70, 0.2);
            margin-bottom: 12px;
        }

        .product-price {
            color: #e63946;
            font-size: 20px;
            font-weight: bold;
        }

        .product-plan {
            color: #a0a0a0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            width: 100%;
            text-align: center;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4);
        }

        .btn-secondary {
            background: rgba(230, 57, 70, 0.2);
            border: 1px solid #e63946;
            color: #e63946;
        }

        .btn-secondary:hover {
            background: rgba(230, 57, 70, 0.3);
        }

        /* CART SECTION */
        .cart-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(230, 57, 70, 0.3);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .cart-section h2 {
            color: #e63946;
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cart-empty {
            color: #a0a0a0;
            text-align: center;
            padding: 40px 20px;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cart-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(230, 57, 70, 0.2);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-name {
            color: #e63946;
            font-weight: bold;
        }

        .cart-item-price {
            color: #e0e0e0;
            font-weight: bold;
        }

        .cart-summary {
            border-top: 2px solid rgba(230, 57, 70, 0.2);
            padding-top: 20px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-total {
            font-size: 18px;
            color: #e63946;
            font-weight: bold;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #e0e0e0;
            margin-bottom: 10px;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 12px;
            margin-top: 60px;
            position: relative;
            z-index: 1;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            .page-header h1 {
                font-size: 24px;
            }

            .controls {
                flex-direction: column;
            }

            .controls select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo">🔴 RED88 PLATFORM</div>
        <div class="user-info">
            <span>Store</span>
            <a href="/">← Back to Portal</a>
        </div>
    </header>

    <div class="container">
        <!-- BREADCRUMB -->
        <div class="breadcrumb">
            <a href="/">Home</a> / Store
        </div>

        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1>🛍️ RED88 Store</h1>
            <p>Premium products and services for RED88 License holders</p>
        </div>

        <!-- FILTER & SORT -->
        <div class="controls">
            <label>Filter by Category:</label>
            <select id="categoryFilter" onchange="filterProducts()">
                <option value="">All Categories</option>
                <option value="tools">Tools</option>
                <option value="software">Software</option>
                <option value="utilities">Utilities</option>
                <option value="premium">Premium</option>
            </select>

            <label style="margin-left: 20px;">Sort by:</label>
            <select id="sortBy" onchange="sortProducts()">
                <option value="newest">Newest First</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="name">Name: A to Z</option>
            </select>
        </div>

        <!-- PRODUCTS GRID -->
        <div class="products-grid" id="productsGrid">
            <div style="grid-column: 1/-1; text-align: center; color: #a0a0a0; padding: 40px;">
                Loading products...
            </div>
        </div>

        <!-- SHOPPING CART -->
        <div class="cart-section">
            <h2>🛒 Shopping Cart</h2>
            <div id="cartContent">
                <div class="cart-empty">
                    Your cart is empty. Add products to get started!
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 RED88 Platform. All rights reserved. | <a href="/" style="color: #e63946;">Home</a> | <a href="/admin" style="color: #e63946;">Admin</a></p>
    </footer>

    <script>
        let cart = [];
        let allProducts = [];

        // Load products from backend API
        async function loadProducts() {
            try {
                const response = await fetch('/api/admin/products');
                const products = await response.json();
                allProducts = products;
                displayProducts(products);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsGrid').innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #ff6a6a; padding: 40px;">Failed to load products. Please refresh the page.</div>';
            }
        }

        // Display products in grid
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');

            if (products.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📦</div>
                            <h3>No Products Available</h3>
                            <p>Check back soon for new products!</p>
                        </div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}" onerror="this.parentElement.textContent='📦'">` : '📦'}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${product.category || 'Uncategorized'}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description || 'Premium product for RED88 members'}</div>
                        <div class="product-meta">
                            <div class="product-price">$${parseFloat(product.price).toFixed(2)}</div>
                            <div class="product-plan">${product.plan_type || 'One-time'}</div>
                        </div>
                        <button class="btn" onclick="addToCart('${product.name}', ${product.price}, '${product.id || 'unknown'}')">
                            Add to Cart
                        </button>
                        <button class="btn btn-secondary" onclick="viewDetails('${product.id || 'unknown'}', '${product.download_url || '#'}')">
                            View Details
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Filter by category
        function filterProducts() {
            const category = document.getElementById('categoryFilter').value;
            const filtered = category
                ? allProducts.filter(p => p.category === category)
                : allProducts;
            displayProducts(filtered);
        }

        // Sort products
        function sortProducts() {
            const sortBy = document.getElementById('sortBy').value;
            const sorted = [...allProducts];

            switch(sortBy) {
                case 'price-low':
                    sorted.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    sorted.sort((a, b) => b.price - a.price);
                    break;
                case 'name':
                    sorted.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'newest':
                default:
                    // Keep original order
                    break;
            }
            displayProducts(sorted);
        }

        // Add to cart
        function addToCart(name, price, productId) {
            cart.push({ name, price, productId });
            updateCart();

            // Show toast notification
            const toast = document.createElement('div');
            toast.textContent = `${name} added to cart!`;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #e63946;
                color: white;
                padding: 12px 20px;
                border-radius: 6px;
                font-size: 13px;
                z-index: 100;
                animation: slideUp 0.3s ease;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Update cart display
        function updateCart() {
            const cartContent = document.getElementById('cartContent');

            if (cart.length === 0) {
                cartContent.innerHTML = '<div class="cart-empty">Your cart is empty. Add products to get started!</div>';
                return;
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const cartHtml = `
                <div class="cart-items">
                    ${cart.map((item, index) => `
                        <div class="cart-item">
                            <div>
                                <div class="cart-item-name">${item.name}</div>
                                <div style="color: #a0a0a0; font-size: 12px;">$${item.price.toFixed(2)}</div>
                            </div>
                            <button class="btn btn-secondary" style="width: auto; padding: 6px 12px; font-size: 12px;" onclick="removeFromCart(${index})">Remove</button>
                        </div>
                    `).join('')}
                </div>
                <div class="cart-summary">
                    <div>
                        <div style="color: #a0a0a0; font-size: 12px; margin-bottom: 5px;">Total:</div>
                        <div class="cart-total">$${total.toFixed(2)}</div>
                    </div>
                    <button class="btn" style="width: 200px;">Proceed to Checkout</button>
                </div>
            `;
            cartContent.innerHTML = cartHtml;
        }

        // Remove from cart
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        // View product details
        function viewDetails(productId, downloadUrl) {
            if (downloadUrl && downloadUrl !== '#') {
                window.open(downloadUrl, '_blank');
            } else {
                alert('Download link not available for this product.');
            }
        }

        // Load products on page load
        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
