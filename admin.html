<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED88 Admin - Manage Products</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(90deg, #e63946 0%, #a4161a 100%);
            padding: 20px;
            color: white;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 1px;
        }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.3);
        }

        .form-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(230,57,70,0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .form-section h2 {
            color: #e63946;
            margin-bottom: 20px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #e63946;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(230,57,70,0.3);
            color: #e0e0e0;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #e63946;
            box-shadow: 0 0 10px rgba(230,57,70,0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        small {
            color: #a0a0a0;
            margin-top: 5px;
            font-size: 12px;
        }

        .btn {
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230,57,70,0.4);
        }

        .btn-full {
            width: 100%;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(230,57,70,0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-details {
            padding: 15px;
        }

        .product-name {
            color: #e63946;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .product-price {
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .product-actions button {
            flex: 1;
            padding: 8px;
            font-size: 11px;
        }

        .btn-danger {
            background: rgba(239,68,68,0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔴 RED88 - Admin Dashboard</h1>
            <a href="/" class="btn-back">← Back to Portal</a>
        </header>

        <!-- ADD PRODUCT FORM -->
        <div class="form-section">
            <h2>➕ Add New Product</h2>
            <form method="POST" action="/api/admin/product/add">
                <div class="form-row">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" name="product_name" placeholder="e.g., Professional Suite" required>
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" name="price" placeholder="49.99" step="0.01" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category" required>
                            <option value="">Select Category</option>
                            <option value="tools">Tools</option>
                            <option value="software">Software</option>
                            <option value="utilities">Utilities</option>
                            <option value="premium">Premium</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Plan Type</label>
                        <select name="plan_type" required>
                            <option value="">Select Plan</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Product Image (Google Drive Link)</label>
                        <input type="text" name="product_image_url" placeholder="https://drive.google.com/uc?export=view&id=xxxxx" required>
                        <small>📌 Right-click image in Google Drive → Share → Copy link</small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Download File (Google Drive Link)</label>
                        <input type="text" name="download_url" placeholder="https://drive.google.com/uc?export=download&id=xxxxx" required>
                        <small>📌 Right-click file in Google Drive → Share → Copy link</small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" placeholder="Product description..." required></textarea>
                    </div>
                </div>

                <button type="submit" class="btn btn-full">✅ Add Product</button>
            </form>
        </div>

        <!-- FREE TOOLS FORM -->
        <div class="form-section">
            <h2>🎁 Add Free Tool</h2>
            <form method="POST" action="/api/admin/tool/add">
                <div class="form-row">
                    <div class="form-group">
                        <label>Tool Name</label>
                        <input type="text" name="tool_name" placeholder="e.g., System Optimizer" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" name="tool_description" placeholder="Brief description" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tool Download (Google Drive Link)</label>
                        <input type="text" name="tool_download_url" placeholder="https://drive.google.com/uc?export=download&id=xxxxx" required>
                        <small>📌 Google Drive shareable link</small>
                    </div>
                    <div class="form-group">
                        <label>Visibility</label>
                        <select name="tool_visibility" required>
                            <option value="show">Show (Visible)</option>
                            <option value="hide">Hide (Admin Only)</option>
                            <option value="coming">Coming Soon</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-full">✅ Add Free Tool</button>
            </form>
        </div>

        <!-- PRODUCTS LIST -->
        <div class="form-section">
            <h2>📦 Your Products</h2>
            <div class="products-grid" id="productsGrid">
                <p style="color: #a0a0a0;">No products yet. Add your first product above!</p>
            </div>
        </div>
    </div>

    <script>
        // Load products from backend
        fetch('/api/admin/products')
            .then(r => r.json())
            .then(products => {
                const grid = document.getElementById('productsGrid');
                if (products.length === 0) return;

                grid.innerHTML = products.map(p => `
                    <div class="product-card">
                        <div class="product-image">📦</div>
                        <div class="product-details">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">$${p.price}</div>
                            <div class="product-actions">
                                <button class="btn btn-danger">Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
